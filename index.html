<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown 查看器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
  /* ===== 基础样式（不变） ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg-secondary: #f8f8f8; --bg-tertiary: #f0f0f0;
    --text: #1a1a1a; --text-secondary: #666666; --text-muted: #999999;
    --border: #e0e0e0; --accent: #2c5f8a; --accent-light: #e8f0f8; --accent-hover: #1e4a6f;
    --sidebar-width: 240px; --radius: 6px;
    --font-mono: 'SF Mono','Fira Code','Cascadia Code',Consolas,monospace;
    --font-sans: -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  }
  html { font-size: 15px; }
  body {
    font-family: var(--font-sans); color: var(--text); background: var(--bg);
    line-height: 1.6; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; height: 48px; border-bottom: 1px solid var(--border);
    background: var(--bg); flex-shrink: 0; user-select: none;
  }
  .header-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .sidebar-toggle {
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    width: 32px; height: 32px; border: 1px solid var(--border);
    border-radius: var(--radius); background: var(--bg); cursor: pointer;
    color: var(--text-secondary); transition: all 0.15s;
  }
  .sidebar-toggle:hover { background: var(--bg-secondary); border-color: #ccc; }
  .sidebar-toggle svg { display: block; }
  .header-title { font-size: 15px; font-weight: 600; color: var(--text); white-space: nowrap; }
  .header-path {
    font-size: 12px; color: var(--text-muted); overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }
  .header-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; font-size: 13px;
    font-family: var(--font-sans); border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg); color: var(--text); cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .btn:hover { background: var(--bg-secondary); border-color: #ccc; }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .main { display: flex; flex: 1; overflow: hidden; position: relative; }

  /* ===== Sidebar ===== */
  .sidebar {
    width: var(--sidebar-width); flex-shrink: 0;
    border-right: 1px solid var(--border); background: var(--bg-secondary);
    display: flex; flex-direction: column; overflow: hidden;
    transition: margin-left 0.25s ease;
  }
  .sidebar.collapsed { margin-left: calc(-1 * var(--sidebar-width)); }
  .sidebar-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px 8px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .sidebar-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); }
  .sidebar-count { font-size: 11px; color: var(--text-muted); background: var(--bg-tertiary); padding: 1px 7px; border-radius: 8px; }
  .sidebar-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  .sidebar-list::-webkit-scrollbar { width: 4px; }
  .sidebar-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .sidebar-item {
    display: block; width: 100%; text-align: left;
    padding: 7px 16px 7px 20px; font-size: 13px; color: var(--text-secondary);
    background: none; border: none; cursor: pointer; transition: all 0.1s;
    font-family: var(--font-sans); line-height: 1.4;
    border-left: 3px solid transparent;
  }
  .sidebar-item:hover { background: var(--bg-tertiary); color: var(--text); }
  .sidebar-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; border-left-color: var(--accent); }
  .sidebar-empty { padding: 32px 16px; text-align: center; color: var(--text-muted); font-size: 13px; line-height: 1.8; }
  .sidebar-404 {
    padding: 32px 16px; text-align: center;
  }
  .sidebar-404-code {
    font-size: 48px; font-weight: 700; color: var(--border); line-height: 1;
    margin-bottom: 12px;
  }
  .sidebar-404-msg {
    font-size: 13px; color: var(--text-muted); line-height: 1.6;
  }

  /* ===== Content ===== */
  .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
  .preview-wrap {
    flex: 1; overflow-y: auto; padding: 28px 36px; background: var(--bg);
  }
  .preview-wrap::-webkit-scrollbar { width: 6px; }
  .preview-wrap::-webkit-scrollbar-track { background: transparent; }
  .preview-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .preview-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: var(--text-muted); font-size: 14px; gap: 12px;
  }

  /* ===== Preview Styles ===== */
  .preview-wrap h1, .preview-wrap h2, .preview-wrap h3,
  .preview-wrap h4, .preview-wrap h5, .preview-wrap h6 { margin: 1.2em 0 0.5em; font-weight: 600; line-height: 1.3; color: var(--text); }
  .preview-wrap h1 { font-size: 1.75em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border); margin-top: 0; }
  .preview-wrap h2 { font-size: 1.4em; padding-bottom: 0.25em; border-bottom: 1px solid var(--border); }
  .preview-wrap h3 { font-size: 1.15em; }
  .preview-wrap p { margin: 0.7em 0; }
  .preview-wrap strong { font-weight: 600; }
  .preview-wrap blockquote { margin: 1em 0; padding: 12px 20px; border-left: 4px solid var(--accent); background: var(--accent-light); border-radius: 0 var(--radius) var(--radius) 0; color: var(--text-secondary); }
  .preview-wrap blockquote p { margin: 0.3em 0; }
  .preview-wrap ul, .preview-wrap ol { margin: 0.6em 0; padding-left: 1.8em; }
  .preview-wrap li { margin: 0.3em 0; }
  .preview-wrap hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }
  .preview-wrap img { max-width: 100%; border-radius: var(--radius); margin: 1em 0; display: block; }
  .preview-wrap table { width: 100%; border-collapse: collapse; margin: 1em 0; font-size: 0.9em; }
  .preview-wrap th, .preview-wrap td { border: 1px solid var(--border); padding: 8px 14px; text-align: left; }
  .preview-wrap th { background: var(--bg-secondary); font-weight: 600; }
  .preview-wrap tr:nth-child(even) { background: var(--bg-secondary); }
  .preview-wrap code { font-family: var(--font-mono); font-size: 0.88em; background: var(--bg-tertiary); padding: 2px 6px; border-radius: 3px; color: #d63384; }
  .preview-wrap pre { margin: 1em 0; border-radius: var(--radius); overflow-x: auto; background: #f6f8fa; border: 1px solid var(--border); }
  .preview-wrap pre code { background: none; padding: 16px 20px; display: block; color: var(--text); font-size: 0.85em; line-height: 1.6; }
  .preview-wrap pre::-webkit-scrollbar { height: 5px; }
  .preview-wrap pre::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
  .preview-wrap input[type="checkbox"] { margin-right: 6px; accent-color: var(--accent); }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--text); color: var(--bg); padding: 10px 24px; border-radius: var(--radius);
    font-size: 13px; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  @media (max-width: 768px) {
    :root { --sidebar-width: 200px; }
    .header-path { display: none; }
    .preview-wrap { padding: 16px 20px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <button class="sidebar-toggle" id="sidebarToggle" title="切换侧边栏">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <line x1="3" y1="4" x2="13" y2="4"/><line x1="3" y1="8" x2="13" y2="8"/><line x1="3" y1="12" x2="13" y2="12"/>
      </svg>
    </button>
    <span class="header-path" id="headerPath"></span>
  </div>
</header>

<div class="main">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">目录</span>
      <span class="sidebar-count" id="fileCount">0</span>
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
  </aside>

  <main class="content">
    <div class="preview-wrap" id="preview">
      <div class="preview-empty">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        <span>正在加载文档列表...</span>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  const sidebar = document.getElementById('sidebar');
  const sidebarToggle = document.getElementById('sidebarToggle');
  const sidebarList = document.getElementById('sidebarList');
  const fileCount = document.getElementById('fileCount');
  const preview = document.getElementById('preview');
  const headerPath = document.getElementById('headerPath');
  const toastEl = document.getElementById('toast');

  let toastTimer = null;
  let sidebarVisible = true;

  sidebarToggle.addEventListener('click', () => {
    sidebarVisible = !sidebarVisible;
    sidebar.classList.toggle('collapsed', !sidebarVisible);
  });

  function showToast(msg) {
    clearTimeout(toastTimer);
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2500);
  }

  function parseFileName(name) {
    const match = name.match(/^(\d+)\s*[.、．]\s*(.+)\.md$/i);
    if (match) return { order: parseInt(match[1], 10), title: match[2].trim() };
    const base = name.replace(/\.md$/i, '');
    return { order: Infinity, title: base };
  }

  function renderSidebar(files) {
    sidebarList.innerHTML = '';
    if (!files || files.length === 0) {
      fileCount.textContent = '0';
      headerPath.textContent = '';
      preview.innerHTML =
        '<div class="preview-empty">' +
        '<div class="sidebar-404">' +
        '<div class="sidebar-404-code">404</div>' +
        '<div class="sidebar-404-msg">当前目录下没有 Markdown 文件</div>' +
        '</div></div>';
      sidebarList.innerHTML =
        '<div class="sidebar-404">' +
        '<div class="sidebar-404-code">404</div>' +
        '<div class="sidebar-404-msg">未找到 Markdown 文件</div>' +
        '</div>';
      return;
    }

    fileCount.textContent = files.length;
    files.forEach((entry, index) => {
      const btn = document.createElement('button');
      btn.className = 'sidebar-item';
      btn.textContent = entry.title;
      btn.dataset.index = index;
      btn.addEventListener('click', () => loadFile(entry, index));
      sidebarList.appendChild(btn);
    });

    if (files.length > 0) loadFile(files[0], 0);
  }

  // ===== 核心修复：过滤裸 CSS =====
  function stripBareCSS(text) {
    // 去掉 /* ... */ 注释
    text = text.replace(/\/\*[\s\S]*?\*\//g, '');
    // 去掉 .class { ... } 裸CSS块（不包含在 ```css 中的）
    text = text.replace(/\n*[.\w#\-]+\s*\{[\s\S]*?\}\s*/g, '');
    return text;
  }

  function renderMarkdown(text) {
    if (!text || !text.trim()) {
      preview.innerHTML = '<div class="preview-empty"><span>文件内容为空</span></div>';
      return;
    }
    try {
      // 先过滤裸 CSS
      let clean = stripBareCSS(text);

      if (typeof marked !== 'undefined') {
        marked.setOptions({
          gfm: true,
          breaks: true,
          highlight: function(code, lang) {
            if (lang && hljs && hljs.getLanguage(lang)) {
              try {
                return hljs.highlight(code, { language: lang }).value;
              } catch (e) {
                return code;
              }
            }
            return code;
          }
        });
        const html = marked.parse(clean);
        preview.innerHTML = html;
        if (typeof hljs !== 'undefined') {
          preview.querySelectorAll('pre code').forEach(block => {
            try {
              hljs.highlightElement(block);
            } catch (e) {}
          });
        }
      } else {
        preview.innerHTML = '<p>' + clean.replace(/\n/g, '<br>') + '</p>';
      }
    } catch(e) {
      preview.innerHTML = '<div class="preview-empty">渲染错误: ' + e.message + '</div>';
    }
  }

  function loadFile(entry, index) {
    document.querySelectorAll('.sidebar-item').forEach((el, i) => {
      el.classList.toggle('active', i === index);
    });
    fetch(entry.fullName)
      .then(res => {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.text();
      })
      .then(text => renderMarkdown(text))
      .catch(err => {
        preview.innerHTML =
          '<div class="preview-empty">' +
          '<span style="color:#c00;">加载失败: ' + err.message + '</span>' +
          '</div>';
      });
  }

  function init(filesJson) {
    let raw = [];
    try {
      raw = JSON.parse(filesJson);
    } catch(e) {
      raw = [];
    }
    const parsed = raw
      .map(f => {
        const p = parseFileName(f);
        return { order: p.order, title: p.title, fullName: f };
      })
      .sort((a, b) => a.order - b.order);
    renderSidebar(parsed);
  }

  window.mdViewerInit = init;

  function waitLibs(cb) {
    if (typeof marked !== 'undefined' && typeof hljs !== 'undefined') {
      cb();
      return;
    }
    setTimeout(() => waitLibs(cb), 50);
  }

  waitLibs(() => {
    if (window.__MD_FILES__) {
      init(window.__MD_FILES__);
    }
  });

})();
</script>
</body>
</html>
