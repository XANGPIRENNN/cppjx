<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown 查看器</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg-secondary: #f8f8f8; --bg-tertiary: #f0f0f0;
    --text: #1a1a1a; --text-secondary: #666666; --text-muted: #999999;
    --border: #e0e0e0; --accent: #2c5f8a; --accent-light: #e8f0f8; --accent-hover: #1e4a6f;
    --sidebar-width: 240px; --radius: 6px;
    --font-mono: 'SF Mono','Fira Code','Cascadia Code',Consolas,monospace;
    --font-sans: -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  }
  html { font-size: 15px; }
  body {
    font-family: var(--font-sans); color: var(--text); background: var(--bg);
    line-height: 1.6; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .header {
    display: flex; align-items: center; padding: 0 16px; height: 48px;
    border-bottom: 1px solid var(--border); background: var(--bg); flex-shrink: 0; user-select: none;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .sidebar-toggle {
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg); cursor: pointer; color: var(--text-secondary); transition: all 0.15s;
  }
  .sidebar-toggle:hover { background: var(--bg-secondary); border-color: #ccc; }
  .header-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .main { display: flex; flex: 1; overflow: hidden; position: relative; }
  .sidebar {
    width: var(--sidebar-width); flex-shrink: 0;
    border-right: 1px solid var(--border); background: var(--bg-secondary);
    display: flex; flex-direction: column; overflow: hidden;
    transition: margin-left 0.25s ease, opacity 0.2s ease;
  }
  .sidebar.collapsed { margin-left: calc(-1 * var(--sidebar-width)); opacity: 0; pointer-events: none; }
  .sidebar-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px 8px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .sidebar-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); }
  .sidebar-count { font-size: 11px; color: var(--text-muted); background: var(--bg-tertiary); padding: 1px 7px; border-radius: 8px; }
  .sidebar-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  .sidebar-list::-webkit-scrollbar { width: 4px; }
  .sidebar-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .sidebar-item {
    display: block; width: calc(100% - 8px); text-align: left; margin: 2px 4px;
    padding: 7px 14px; font-size: 13px; color: var(--text-secondary);
    background: none; border: none; cursor: pointer; transition: all 0.12s;
    font-family: var(--font-sans); line-height: 1.4; border-radius: 8px;
  }
  .sidebar-item:hover { background: var(--bg-tertiary); color: var(--text); }
  .sidebar-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
  .sidebar-404 {
    padding: 40px 16px; text-align: center;
  }
  .sidebar-404-code { font-size: 48px; font-weight: 700; color: var(--border); line-height: 1; margin-bottom: 12px; }
  .sidebar-404-msg { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
  .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
  .preview-wrap {
    flex: 1; overflow-y: auto; padding: 28px 36px; background: var(--bg);
  }
  .preview-wrap::-webkit-scrollbar { width: 6px; }
  .preview-wrap::-webkit-scrollbar-track { background: transparent; }
  .preview-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .preview-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: var(--text-muted); font-size: 14px; gap: 12px;
  }
  .preview-loading {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: var(--text-muted); font-size: 14px; gap: 12px;
  }
  .preview-loading .spinner {
    width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .preview-error {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: #c62828; font-size: 14px; gap: 12px;
  }
  .preview-error .code { font-family: var(--font-mono); font-size: 48px; font-weight: 700; color: #e0e0e0; }
  .preview-wrap h1, .preview-wrap h2, .preview-wrap h3, .preview-wrap h4, .preview-wrap h5, .preview-wrap h6 {
    margin: 1.2em 0 0.5em; font-weight: 600; line-height: 1.3; color: var(--text);
  }
  .preview-wrap h1 { font-size: 1.75em; padding-bottom: 0.3em; border-bottom: 1px solid var(--border); margin-top: 0; }
  .preview-wrap h2 { font-size: 1.4em; padding-bottom: 0.25em; border-bottom: 1px solid var(--border); }
  .preview-wrap h3 { font-size: 1.15em; }
  .preview-wrap p { margin: 0.7em 0; }
  .preview-wrap strong { font-weight: 600; }
  .preview-wrap blockquote { margin: 1em 0; padding: 12px 20px; border-left: 4px solid var(--accent); background: var(--accent-light); border-radius: 0 var(--radius) var(--radius) 0; color: var(--text-secondary); }
  .preview-wrap ul, .preview-wrap ol { margin: 0.6em 0; padding-left: 1.8em; }
  .preview-wrap li { margin: 0.3em 0; }
  .preview-wrap hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }
  .preview-wrap img { max-width: 100%; border-radius: var(--radius); margin: 1em 0; display: block; }
  .preview-wrap table { width: 100%; border-collapse: collapse; margin: 1em 0; font-size: 0.9em; }
  .preview-wrap th, .preview-wrap td { border: 1px solid var(--border); padding: 8px 14px; text-align: left; }
  .preview-wrap th { background: var(--bg-secondary); font-weight: 600; }
  .preview-wrap code { font-family: var(--font-mono); font-size: 0.88em; background: var(--bg-tertiary); padding: 2px 6px; border-radius: 3px; color: #d63384; }
  .preview-wrap pre { margin: 1em 0; border-radius: var(--radius); overflow-x: auto; background: #f6f8fa; border: 1px solid var(--border); }
  .preview-wrap pre code { background: none; padding: 16px 20px; display: block; color: var(--text); font-size: 0.85em; line-height: 1.6; }
  .preview-wrap pre::-webkit-scrollbar { height: 5px; }
  .preview-wrap pre::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
  .preview-wrap input[type="checkbox"] { margin-right: 6px; accent-color: var(--accent); }
  .sidebar-footer {
    border-top: 1px solid var(--border); padding: 8px 12px; flex-shrink: 0;
  }
  .sidebar-footer-btn {
    display: flex; align-items: center; justify-content: center; width: 100%;
    padding: 7px 12px; font-size: 13px; font-family: var(--font-sans);
    color: var(--text-secondary); background: none; border: none;
    border-radius: 8px; cursor: pointer; transition: all 0.12s;
  }
  .sidebar-footer-btn:hover { background: var(--bg-tertiary); color: var(--text); }
  .has-bg .preview-wrap { background: transparent; position: relative; }
  .has-bg .preview-wrap::before {
    content: ''; position: fixed; inset: 0; z-index: -1;
    background-image: var(--bg-image);
    background-size: cover; background-position: center; background-repeat: no-repeat;
    filter: blur(var(--bg-blur, 0px));
    opacity: calc(1 - var(--bg-dark, 0) / 100);
  }
  .has-bg .preview-wrap .preview-empty { background: rgba(255,255,255,0.85); padding: 24px; border-radius: var(--radius); }
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.35);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
  }
  .modal-overlay.open { opacity: 1; pointer-events: auto; }
  .modal-panel {
    background: var(--bg); border-radius: 12px; width: 380px; max-width: 90vw;
    box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    transform: translateY(20px) scale(0.96);
    transition: transform 0.3s ease; overflow: hidden;
  }
  .modal-overlay.open .modal-panel { transform: translateY(0) scale(1); }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px 12px; border-bottom: 1px solid var(--border);
  }
  .modal-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .modal-close {
    display: flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border: none; background: none;
    border-radius: 6px; cursor: pointer; color: var(--text-muted); transition: all 0.12s;
  }
  .modal-close:hover { background: var(--bg-tertiary); color: var(--text); }
  .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .bg-preview {
    width: 100%; height: 100px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg-secondary); display: flex; align-items: center;
    justify-content: center; overflow: hidden; background-size: cover; background-position: center;
  }
  .bg-preview-placeholder { font-size: 13px; color: var(--text-muted); }
  .bg-row { display: flex; flex-direction: column; gap: 8px; }
  .bg-label { font-size: 13px; color: var(--text-secondary); display: flex; justify-content: space-between; }
  .bg-val { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); min-width: 24px; text-align: right; }
  .custom-btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 8px 16px; font-size: 13px; font-family: var(--font-sans);
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg); color: var(--text-secondary);
    cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .custom-btn:hover { background: var(--bg-secondary); border-color: #bbb; color: var(--text); }
  .custom-btn-outline {
    border: 1px dashed var(--border); background: var(--bg-secondary);
    color: var(--text-secondary); width: 100%;
  }
  .custom-btn-outline:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .custom-btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .custom-btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .custom-slider { padding: 4px 0; cursor: pointer; }
  .custom-slider-track {
    position: relative; height: 6px; background: var(--bg-tertiary);
    border-radius: 3px; cursor: pointer;
  }
  .custom-slider-fill {
    position: absolute; left: 0; top: 0; height: 100%;
    background: var(--accent); border-radius: 3px; pointer-events: none;
  }
  .custom-slider-thumb {
    position: absolute; top: 50%; width: 18px; height: 18px;
    background: var(--accent); border: 2px solid #fff;
    border-radius: 50%; transform: translate(-50%, -50%);
    box-shadow: 0 1px 4px rgba(0,0,0,0.2); pointer-events: none;
  }
  .bg-actions { display: flex; gap: 8px; justify-content: flex-end; padding-top: 8px; }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--text); color: var(--bg); padding: 10px 24px; border-radius: var(--radius);
    font-size: 13px; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  @media (max-width: 768px) {
    :root { --sidebar-width: 200px; }
    .preview-wrap { padding: 16px 20px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <button class="sidebar-toggle" id="sidebarToggle" title="切换侧边栏">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <line x1="3" y1="4" x2="13" y2="4"/><line x1="3" y1="8" x2="13" y2="8"/><line x1="3" y1="12" x2="13" y2="12"/>
      </svg>
    </button>
    <span class="header-title">Markdown 查看器</span>
  </div>
</header>

<div class="main">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">目录</span>
      <span class="sidebar-count" id="fileCount">0</span>
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
    <div class="sidebar-footer">
      <button class="sidebar-footer-btn" id="bgSettingBtn" title="设置">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </aside>

  <main class="content">
    <div class="preview-wrap" id="preview">
      <div class="preview-empty">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        <span>选择文档查看</span>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<!-- ===== 背景设置弹窗 ===== -->
<div class="modal-overlay" id="bgModal">
  <div class="modal-panel">
    <div class="modal-header">
      <span class="modal-title">背景图片设置</span>
      <button class="modal-close" id="bgModalClose">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="bg-preview" id="bgPreview">
        <span class="bg-preview-placeholder">暂无背景图片</span>
      </div>
      <div class="bg-row">
        <label class="bg-label">选择图片</label>
        <button class="custom-btn custom-btn-outline" id="bgPickBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
          </svg> 上传图片
        </button>
        <input type="file" id="bgFileInput" accept="image/*" hidden>
      </div>
      <div class="bg-row">
        <label class="bg-label">模糊度 <span class="bg-val" id="blurVal">0</span></label>
        <div class="custom-slider"><div class="custom-slider-track" id="blurTrack"><div class="custom-slider-fill" id="blurFill"></div><div class="custom-slider-thumb" id="blurThumb"></div></div></div>
      </div>
      <div class="bg-row">
        <label class="bg-label">暗化 <span class="bg-val" id="darkVal">0</span></label>
        <div class="custom-slider"><div class="custom-slider-track" id="darkTrack"><div class="custom-slider-fill" id="darkFill"></div><div class="custom-slider-thumb" id="darkThumb"></div></div></div>
      </div>
      <div class="bg-actions">
        <button class="custom-btn" id="bgResetBtn">重置背景</button>
        <button class="custom-btn custom-btn-primary" id="bgApplyBtn">应用</button>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  const sidebar = document.getElementById('sidebar');
  const sidebarToggle = document.getElementById('sidebarToggle');
  const sidebarList = document.getElementById('sidebarList');
  const fileCount = document.getElementById('fileCount');
  const preview = document.getElementById('preview');
  const toastEl = document.getElementById('toast');

  // Background elements
  const bgModal = document.getElementById('bgModal');
  const bgModalClose = document.getElementById('bgModalClose');
  const bgSettingBtn = document.getElementById('bgSettingBtn');
  const bgPickBtn = document.getElementById('bgPickBtn');
  const bgFileInput = document.getElementById('bgFileInput');
  const bgPreview = document.getElementById('bgPreview');
  const blurTrack = document.getElementById('blurTrack');
  const blurFill = document.getElementById('blurFill');
  const blurThumb = document.getElementById('blurThumb');
  const blurVal = document.getElementById('blurVal');
  const darkTrack = document.getElementById('darkTrack');
  const darkFill = document.getElementById('darkFill');
  const darkThumb = document.getElementById('darkThumb');
  const darkVal = document.getElementById('darkVal');
  const bgResetBtn = document.getElementById('bgResetBtn');
  const bgApplyBtn = document.getElementById('bgApplyBtn');

  let toastTimer = null;
  let sidebarVisible = true;

  // ===== Toast =====
  function showToast(msg) {
    clearTimeout(toastTimer);
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2500);
  }

  // ===== Sidebar Toggle =====
  sidebarToggle.addEventListener('click', () => {
    sidebarVisible = !sidebarVisible;
    sidebar.classList.toggle('collapsed', !sidebarVisible);
  });

  // ===== Parse filename: remove number prefix =====
  function parseFileName(name) {
    const match = name.match(/^\d+\s*[.、．_\-]\s*(.+)\.md$/);
    if (match) {
      return { title: match[1].trim(), file: name };
    }
    return { title: name.replace(/\.md$/, ''), file: name };
  }

  // ===== Render Sidebar =====
  function renderSidebar(docs) {
    sidebarList.innerHTML = '';
    if (!docs || docs.length === 0) {
      fileCount.textContent = '0';
      sidebarList.innerHTML = '<div class="sidebar-404"><div class="sidebar-404-code">404</div><div class="sidebar-404-msg">未找到 Markdown 文件</div></div>';
      preview.innerHTML = '<div class="preview-empty"><div style="font-size:48px;font-weight:700;color:#e0e0e0;line-height:1">404</div><span>当前目录下没有 Markdown 文件</span></div>';
      return;
    }
    fileCount.textContent = docs.length;
    docs.forEach((doc, index) => {
      const btn = document.createElement('button');
      btn.className = 'sidebar-item';
      btn.textContent = doc.title;
      btn.dataset.index = index;
      btn.addEventListener('click', () => loadFile(docs, index));
      sidebarList.appendChild(btn);
    });
    loadFile(docs, 0);
  }

  // ===== Load File =====
  function loadFile(docs, index) {
    const doc = docs[index];
    if (!doc) return;
    document.querySelectorAll('.sidebar-item').forEach((el, i) => {
      el.classList.toggle('active', i === index);
    });

    preview.innerHTML = '<div class="preview-loading"><div class="spinner"></div><span>加载中…</span></div>';

    fetch(encodeURI(doc.file))
      .then(res => {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.text();
      })
      .then(text => renderMarkdown(text))
      .catch(err => {
        preview.innerHTML = '<div class="preview-error"><div class="code">404</div><span>加载失败: ' + err.message + '</span></div>';
      });
    preview.scrollTop = 0;
  }

  // ===== Render Markdown =====
  function renderMarkdown(text) {
    if (!text || !text.trim()) {
      preview.innerHTML = '<div class="preview-empty"><span>文件内容为空</span></div>';
      return;
    }
    try {
      let html = typeof marked !== 'undefined'
        ? marked.parse(text, { gfm: true, breaks: true })
        : '<p>' + text.replace(/\n/g, '<br>') + '</p>';
      preview.innerHTML = html;
      if (typeof hljs !== 'undefined') {
        preview.querySelectorAll('pre code').forEach(block => {
          hljs.highlightElement(block);
        });
      }
    } catch(e) {
      preview.innerHTML = '<div class="preview-error">渲染错误: ' + e.message + '</div>';
    }
  }

  // ===== Load docs from files.json =====
  function loadDocs() {
    fetch('files.json')
      .then(res => {
        if (!res.ok) throw new Error('无法加载 files.json');
        return res.json();
      })
      .then(files => {
        if (!Array.isArray(files) || files.length === 0) {
          renderSidebar([]);
          return;
        }
        const docs = files
          .filter(f => f.endsWith('.md'))
          .map(f => {
            const p = parseFileName(f);
            // 提取数字排序
            const numMatch = f.match(/^(\d+)/);
            const order = numMatch ? parseInt(numMatch[1], 10) : Infinity;
            return { order, title: p.title, file: f };
          })
          .sort((a, b) => a.order - b.order);
        renderSidebar(docs);
      })
      .catch(err => {
        console.warn('加载 files.json 失败:', err);
        renderSidebar([]);
      });
  }

  // ===== Init =====
  function waitLibs(cb, n) {
    if (n <= 0) { cb(); return; }
    if (typeof marked !== 'undefined' && typeof hljs !== 'undefined') { cb(); return; }
    setTimeout(() => waitLibs(cb, n - 1), 200);
  }

  waitLibs(() => {
    if (typeof marked !== 'undefined') marked.setOptions({ gfm: true, breaks: true });
    loadDocs();
  }, 100);

  // ===== Background Image =====
  let bgData = loadBgFromStorage();

  function loadBgFromStorage() {
    try {
      const saved = localStorage.getItem('md-viewer-bg');
      if (saved) return JSON.parse(saved);
    } catch(_) {}
    return { image: null, blur: 0, dark: 0 };
  }

  function saveBgToStorage() {
    try {
      localStorage.setItem('md-viewer-bg', JSON.stringify(bgData));
    } catch(_) {}
  }

  function applyBg() {
    const body = document.body;
    if (bgData.image) {
      body.classList.add('has-bg');
      body.style.setProperty('--bg-image', 'url(' + bgData.image + ')');
      body.style.setProperty('--bg-blur', bgData.blur + 'px');
      body.style.setProperty('--bg-dark', bgData.dark);
    } else {
      body.classList.remove('has-bg');
      body.style.removeProperty('--bg-image');
      body.style.removeProperty('--bg-blur');
      body.style.removeProperty('--bg-dark');
    }
  }

  function updateBgPreview() {
    if (bgData.image) {
      bgPreview.style.backgroundImage = 'url(' + bgData.image + ')';
      bgPreview.innerHTML = '';
    } else {
      bgPreview.style.backgroundImage = '';
      bgPreview.innerHTML = '<span class="bg-preview-placeholder">暂无背景图片</span>';
    }
    updateSlider(blurFill, blurThumb, bgData.blur, 20);
    blurVal.textContent = bgData.blur;
    updateSlider(darkFill, darkThumb, bgData.dark, 80);
    darkVal.textContent = bgData.dark;
  }

  function updateSlider(fillEl, thumbEl, value, maxVal) {
    const pct = maxVal > 0 ? (value / maxVal) * 100 : 0;
    fillEl.style.width = pct + '%';
    thumbEl.style.left = pct + '%';
  }

  function createSlider(trackEl, fillEl, thumbEl, maxVal, onChange) {
    function setValue(v) {
      const val = Math.max(0, Math.min(maxVal, Math.round(v)));
      updateSlider(fillEl, thumbEl, val, maxVal);
      return val;
    }
    function posToVal(clientX) {
      const rect = trackEl.getBoundingClientRect();
      const pct = (clientX - rect.left) / rect.width;
      return Math.round(pct * maxVal);
    }
    trackEl.addEventListener('mousedown', (e) => {
      const v = setValue(posToVal(e.clientX));
      onChange(v);
      function onMove(ev) { onChange(setValue(posToVal(ev.clientX))); }
      function onUp() { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
    return { setValue };
  }

  const blurSlider = createSlider(blurTrack, blurFill, blurThumb, 20, (v) => {
    bgData.blur = v; blurVal.textContent = v;
  });
  const darkSlider = createSlider(darkTrack, darkFill, darkThumb, 80, (v) => {
    bgData.dark = v; darkVal.textContent = v;
  });

  bgSettingBtn.addEventListener('click', () => {
    updateBgPreview();
    bgModal.classList.add('open');
  });

  function closeBgModal() { bgModal.classList.remove('open'); }
  bgModalClose.addEventListener('click', closeBgModal);
  bgModal.addEventListener('click', (e) => { if (e.target === bgModal) closeBgModal(); });

  bgPickBtn.addEventListener('click', () => bgFileInput.click());
  bgFileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      bgData.image = ev.target.result;
      updateBgPreview();
    };
    reader.readAsDataURL(file);
    bgFileInput.value = '';
  });

  bgApplyBtn.addEventListener('click', () => {
    saveBgToStorage();
    applyBg();
    closeBgModal();
    showToast('背景已应用');
  });

  bgResetBtn.addEventListener('click', () => {
    bgData = { image: null, blur: 0, dark: 0 };
    blurSlider.setValue(0);
    darkSlider.setValue(0);
    updateBgPreview();
    saveBgToStorage();
    applyBg();
    showToast('背景已重置');
  });

  applyBg();
})();
</script>
</body>
</html>
